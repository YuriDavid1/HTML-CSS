<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Listas</title>
</head>
<body>
    <h1>Testando listas</h1>
    <h2>Listas ordenadas</h2>
    <ol type="1" start="1"> <!-- 1 A a I i-->
        <li>Acordar
        <li>Tomar café
        <li>Trabalhar
        <li>Almoçar
        <li>Descansar
    </ol>
    <h2>Listas não Ordenadas</h2>
    <ul type ="disc"> <!-- disc, circle, square-->
        <li>Correr</li>
        <li>Acadêmia</li>
        <li>Banho</li>
        <li>Caminhar com cachorro</li>
    </ul>
</body>
</html>
